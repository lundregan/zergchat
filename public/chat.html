<!DOCTYPE html>
<html lang="en">
<head>
    <title>zChat</title>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="chat.css">

    <!-- <script src="/socket.io/socket.io.js"></script> -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>

    
    <!--Bootstrap 5-->
    <link 
        rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/css/bootstrap.min.css"
        integrity="sha384-r4NyP46KrjDleawBgD5tp8Y7UzmLA05oM1iAEQ17CSuDqnUK2+k9luXQOfXJCJ4I"
        crossorigin="anonymous"
    >
</head>

<body>
    <div id="app" class="container">
        <div class="row ">
            <div class="col-10">
                <ul id="listMessages" class="list-group" style="margin-bottom: 75px;">
                </ul>
            </div>
            <div class="col-2">
                <h3>Users</h3>
                
                <ul id="listUsers">
                </ul>
            </div>
        </div>

        <div class="row">
            <form id="input" class="fixed-bottom" style="padding: 8px;">
                <label id="labelName" for="inputMessage" class="text-primary form-label font-weight-bold">Unknown</label>
                <div class="row">
                    <div class="col-md-11 col-sm-12">          
                        <input 
                            id="inputMessage"    
                            class="form-control bs-min"
                            type="text"
                            placeholder="lorem ipsum decartica right of man"
                        />
                    </div>
                    <div class="col-md-1 col-sm-2">
                        <button type="button" class="btn btn-primary float-right bs">Send</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- SCRIPTS -->
    <!-- Bootstrap JS. Popper then bootstrap js -->
    <script
        src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
        integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
        crossorigin="anonymous"
    ></script>
    <script 
        src="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/js/bootstrap.min.js"
        integrity="sha384-oesi62hOLfzrys4LxRF63OJCXdXDipiYWBnvTl9Y9/TRlw5xlKIEHpNyvvDShgf/"
        crossorigin="anonymous"
    ></script>

    <script src="client.js"></script>
</body>
</html>
