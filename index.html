<!DOCTYPE html>
<html lang="en">
<head>
    <title>zChat</title>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="index.css">
    
    <!--Bootstrap 5-->
    <link 
        rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/css/bootstrap.min.css"
        integrity="sha384-r4NyP46KrjDleawBgD5tp8Y7UzmLA05oM1iAEQ17CSuDqnUK2+k9luXQOfXJCJ4I"
        crossorigin="anonymous"
    >
</head>

<script>
</script>

<body>
    <div id="app" class="center">
        <div id="cardLogin" class="card mx-auto center bs">
            <h1>zChat Login</h1>
            <p>Simple Chatrooms, for Simple Conversations</p>

            <form class="" action="chat">
                <label for="name" class="form-label">Username:</label>
                <input class="form-control bs-min mb-4" type="name" id="name" name="name" required>
                <label for="room" class="form-label">Room:</label><br />
                <div class="d-flex justify-content-between">
                    <input class="form-control w-50 bs-min" type="room" id="room" name="room" required>
                    <button class="btn btn-primary bs-min" type="submit">Join Chat</button>
                </div>
            </form>
        </div>
    </div>

    <!-- SCRIPTS -->
    
    <!-- <script src="/socket.io/socket.io.js"></script> -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    
    <!-- Bootstrap JS. Popper then bootstrap js -->
    <script
        src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
        integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
        crossorigin="anonymous"
    ></script>
    <script 
        src="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/js/bootstrap.min.js"
        integrity="sha384-oesi62hOLfzrys4LxRF63OJCXdXDipiYWBnvTl9Y9/TRlw5xlKIEHpNyvvDShgf/"
        crossorigin="anonymous"
    ></script>
</body>
</html>
