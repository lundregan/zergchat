<!DOCTYPE html>
<html lang="en">
<head>
    <title>zChat</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
</head>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    width: 100vw;
    height: 100vh;
}

body {
    font: 13px Helvetica, Arial;
}

form {
    background: grey;
    padding: 5px;
    position: fixed;
    bottom: 0;
    width: 100%;
}

form input { 
    border: 0; 
    padding: 10px; 
    width: 90%; 
    margin-right: 0.5%; 
}

form button { 
    width: 9%; 
    background: rgb(130, 224, 255); 
    border: none; 
    padding: 10px; 
}

#msgList { 
    list-style-type: none; 
    margin: 0; 
    padding: 0; 
}

#msgList li { 
    padding: 5px 10px; 
}

#msgList li:nth-child(odd) { 
    background: #eee; 
}

#messageBox {
    position: absolute;
    bottom: 30px;
    width: 100%;
}

#name {
    margin: 2px;
    width: 20%;
}
</style>

<script>
    $(function () {
        var socket = io();
        $('form').submit(function(e){
            e.preventDefault(); // prevents page reloading
            socket.emit('chat message', {
                name: $('#name').val(),
                msg: $('#m').val()
            });
            $('#m').val('');
            return false;
        });

        socket.on('chat message', function(msg){
            let content = `${msg.name}: ${msg.msg}`;
            $('#msgList').append($('<li>').text(content));
        });
  });
</script>

<body>
    <ul id="msgList">

    </ul>

    <form action="">
        <input id="name" />
        <input id="m" autocomplete="off" />
        <button> Send </button>
    </form>
</body>
</html>
